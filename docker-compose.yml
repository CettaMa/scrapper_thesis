services:
  cctv-scraper:
    build: .
    image: cctv-scraper:latest
    container_name: cctv-scraper
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "atcs-dishubkbb.urbanaccess.net:103.151.226.229"
      - "api.open-meteo.com:188.40.99.226"
      - "api.tomtom.com:51.105.97.224"
    env_file:
      - .env
    environment:
      CCTV_CONFIG_FILE: /app/cctv_points.csv
      CCTV_OUTPUT_ROOT: /app/dataset
      TZ: Asia/Jakarta
    volumes:
      - ./dataset:/app/dataset
      - ./cctv_points.csv:/app/cctv_points.csv:ro
      - ./secrets:/app/secrets
